slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    # odom_frame: The frame published by diff_drive_controller (odom).
    # base_frame: Must match the child frame of the odom->base_footprint
    #   transform. robot_state_publisher uses bare 'base_footprint'.
    # scan_topic: /scan_fixed — scan_frame_fixer rewrites the Ignition
    #   namespaced frame_id to 'laser_frame' before SLAM sees it.
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan_fixed
    use_map_saver: true
    mode: mapping

    debug_logging: false
    throttle_scans: 1

    # transform_publish_period: how often SLAM publishes map->odom TF (s).
    # 0.02s (50 Hz) keeps RViz and Nav2 fed with a fresh transform between
    # scan matches using odometry extrapolation.
    transform_publish_period: 0.02

    # map_update_interval: how often the occupancy grid is rebuilt (s).
    map_update_interval: 3.0

    resolution: 0.05
    min_laser_range: 0.3
    max_laser_range: 12.0

    # -------------------------------------------------------------------------
    # minimum_travel_distance / minimum_travel_heading
    #
    # SLAM only runs a scan match after the robot has moved at least this
    # far OR rotated at least this much since the last match.
    #
    # minimum_travel_heading raised from 0.2 -> 0.3 rad (~17 deg).
    # With the wheel friction fix, the robot no longer accumulates phantom
    # yaw. Small heading wobbles (< 0.3 rad) from Ignition joint-velocity
    # noise no longer trigger a scan match and a subsequent map->odom
    # correction. If you see the map drift during slow rotations, lower
    # back to 0.2. If you see jumps on every small turn, raise to 0.35.
    # -------------------------------------------------------------------------
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.35

    # transform_timeout: how long SLAM waits for TF before giving up.
    # 0.5s gives extra margin now that controller_manager runs at 100 Hz
    # (10ms cycle) instead of 1000 Hz, ensuring no TF gaps under load.
    transform_timeout: 0.5

    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true

    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.15
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # -------------------------------------------------------------------------
    # Scan Matcher variance penalties
    #
    # angle_variance_penalty raised from 1.5 -> 2.5.
    # This is the most critical parameter for stopping map->odom yaw jumps.
    # A higher value means SLAM demands much stronger scan evidence before
    # applying any rotational correction to map->odom.
    #
    # The chain of fixes:
    #   1. Wheel friction (left/right_wheels.xacro) eliminates phantom yaw
    #      from the physics simulation. Odom yaw is now trustworthy.
    #   2. controller update_rate:100 keeps Gazebo at RTF~1.0, keeping
    #      timestamps in sync. No more TF lookup failures.
    #   3. angle_variance_penalty:2.5 + minimum_travel_heading:0.3 ensure
    #      SLAM only applies yaw corrections when it has accumulated
    #      significant heading change AND has strong scan match evidence.
    #
    # If walls appear skewed in the final map, decrease toward 2.0.
    # If map still rotates during straight driving, increase toward 3.0.
    # -------------------------------------------------------------------------
    distance_variance_penalty: 0.5
    angle_variance_penalty: 3.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
