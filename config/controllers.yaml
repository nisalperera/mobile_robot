controller_manager:
  ros__parameters:
    # 100 Hz is the correct update_rate for the controller manager with
    # Ignition Gazebo. The physics step runs at 1000 Hz internally, but
    # gz_ros2_control interpolates between physics steps — the controller
    # manager does NOT need to match the physics rate.
    #
    # Running at 1000 Hz caused ~30% extra CPU usage on the laptop, which
    # made Gazebo drop below real-time factor 1.0. When sim_time lags
    # real_time, odom timestamps desync from /scan_fixed timestamps by
    # up to 100ms -> SLAM TF lookup failures -> spurious map->odom jumps.
    #
    # At 100 Hz: controller executes at 10ms intervals (well within the
    # 50Hz odom publish rate), Gazebo stays at RTF ~1.0, timestamps stay
    # in sync.
    update_rate: 100
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    # publish_rate: odometry and TF publish frequency.
    # 50 Hz provides smooth odom for SLAM and Nav2 without excessive
    # /tf bandwidth. Must be <= update_rate (100 Hz).
    publish_rate: 50.0
    use_sim_time: true

    left_wheel_names:  ['front_left_wheel_joint',  'rear_left_wheel_joint']
    right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']
    wheels_per_side: 2

    # -------------------------------------------------------------------------
    # Wheel geometry — measured from URDF xacro.
    #
    # wheel_radius: 0.024 m  — cylinder radius in left/right_wheels.xacro.
    #
    # wheel_separation: 0.350 m  — lateral distance between left and right
    #   wheel centrelines (left Y=+0.175, right Y=-0.175 relative to base_link).
    #
    # wheel_separation_multiplier: corrects the odometry arc error introduced
    #   by using diff_drive_controller (a 2-wheel model) on a 4-wheel robot.
    #
    #   The robot has a 0.20 m wheelbase:
    #     front wheels: X = +0.250 m (relative to chassis/base_link)
    #     rear  wheels: X = +0.050 m (relative to chassis/base_link)
    #   Effective virtual axle X = average = +0.150 m.
    #
    #   During a turn, the front and rear wheel pairs trace arcs of different
    #   radii. Gazebo simulates each contact patch independently (correct).
    #   diff_drive_controller averages the front+rear encoder velocities and
    #   applies a single 2-wheel odometry formula (approximate).
    #
    #   Tune empirically:
    #     1. Drive a 1-metre square in Gazebo with use_slam:=false.
    #     2. Compare final pose in /odom vs Gazebo ground-truth (gz service).
    #     3. If robot over-rotates in odom: decrease toward 0.95.
    #        If robot under-rotates in odom: increase toward 1.10.
    #   Typical range for a 4-wheel skid-steer: 0.95-1.08.
    # -------------------------------------------------------------------------
    wheel_separation: 0.350
    wheel_radius: 0.024
    wheel_separation_multiplier: 1.0
    wheel_radius_multiplier: 1.0

    # Use joint state feedback (encoder positions/velocities) for odometry.
    open_loop: false

    use_stamped_vel: false

    # -------------------------------------------------------------------------
    # TF and odometry topic configuration.
    #
    # publish_odom: true      -> publishes nav_msgs/Odometry on the topic set
    #                            by the launch remapping (/odom/raw).
    #                            EKF subscribes to /odom/raw and publishes the
    #                            fused result on /odom for SLAM and Nav2.
    #
    # publish_odom_tf: FALSE  -> EKF (robot_localization) owns the
    #                            odom -> base_footprint TF.  If the controller
    #                            also published this TF there would be two
    #                            competing transforms on /tf which causes
    #                            TF tree corruption and lookup errors in SLAM.
    #
    # odom_frame_id / base_frame_id are kept as-is so the Odometry message
    # header is correct; the actual topic is remapped at launch time.
    # -------------------------------------------------------------------------
    publish_odom: true
    publish_odom_tf: false
    odom_frame_id: odom
    base_frame_id: base_footprint

    command_interfaces:
      - velocity
    state_interfaces:
      - velocity
      - position

    # -------------------------------------------------------------------------
    # Odometry covariances
    # Diagonal entries for [x, y, z, roll, pitch, yaw].
    # For a ground robot z/roll/pitch are near-zero -> very tight.
    # x/y/yaw loosened to reflect real encoder + wheel slip uncertainty.
    # These values feed into the EKF as odom0 measurement noise.
    # -------------------------------------------------------------------------
    pose_covariance_diagonal:  [0.001, 0.001, 1e-9, 1e-9, 1e-9, 0.01]
    twist_covariance_diagonal: [0.001, 1e-9,  1e-9, 1e-9, 1e-9, 0.01]

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
