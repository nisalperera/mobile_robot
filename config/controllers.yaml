controller_manager:
  ros__parameters:
    # Match Gazebo Ignition physics step (1000 Hz = 0.001 s step).
    # At 35 Hz the gz_ros2_control plugin warned:
    #   "Desired controller update period (0.028s) is slower than
    #    the gazebo simulation period (0.001s)"
    # and the diff_drive_controller executed so rarely that velocity
    # commands were silently dropped → robot frozen in Gazebo.
    update_rate: 1000
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    # publish_rate can stay lower — this is only the odom/tf publish rate,
    # not the command execution rate.
    publish_rate: 50.0
    use_sim_time: true

    left_wheel_names: ['front_left_wheel_joint', 'rear_left_wheel_joint']
    right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']
    wheels_per_side: 2
    wheel_separation: 0.35
    wheel_radius: 0.024
    use_stamped_vel: false

    # -------------------------------------------------------------------------
    # TF and odometry frame configuration.
    #
    # publish_odom_tf: true  → diff_drive_controller writes the
    #   odom → base_footprint transform directly onto /tf.
    #   This is the ONLY publisher of this transform.
    #   Ignition's /tf bridge has been removed from gz.launch.py to
    #   prevent the namespaced Gazebo frames (mobile_robot/odom →
    #   mobile_robot/base_footprint) from clobbering this.
    #
    # odom_frame_id: odom    → must match SLAM Toolbox's odom_frame and
    #                          Nav2's odom topic frame.
    # base_frame_id: base_footprint → must match the URDF root link.
    #   The URDF defines base_footprint as root, with base_link as its
    #   child via a fixed joint published by robot_state_publisher.
    #   Correct chain:
    #     map → odom (SLAM/AMCL)
    #     odom → base_footprint (diff_drive_controller) ← THIS
    #     base_footprint → base_link (robot_state_publisher, fixed)
    #     base_link → chassis/wheels/sensors (robot_state_publisher)
    # -------------------------------------------------------------------------
    publish_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_footprint

    command_interfaces:
      - velocity
    state_interfaces:
      - velocity
      - position

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
