controller_manager:
  ros__parameters:
    # Match Gazebo Ignition physics step (1000 Hz = 0.001 s step).
    # At 35 Hz the gz_ros2_control plugin warned:
    #   "Desired controller update period (0.028s) is slower than
    #    the gazebo simulation period (0.001s)"
    # and the diff_drive_controller executed so rarely that velocity
    # commands were silently dropped → robot frozen in Gazebo.
    update_rate: 1000
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    # publish_rate can stay lower — this is only the odom/tf publish rate,
    # not the command execution rate.
    publish_rate: 50.0

    # IMPORTANT: Must be 'base_footprint', NOT 'base_link'.
    # The URDF defines base_footprint as the root link, with base_link as
    # its child via a fixed joint. The diff_drive_controller publishes the
    # odom→base_frame_id transform. If this were 'base_link', the controller
    # would publish odom→base_link, but RSP also publishes base_footprint→base_link
    # (fixed joint), making base_link have TWO parents — a TF tree violation.
    # Correct chain: odom → base_footprint (controller) → base_link (RSP fixed joint)
    base_frame_id: base_footprint

    left_wheel_names: ['front_left_wheel_joint', 'rear_left_wheel_joint']
    right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']
    wheels_per_side: 2
    wheel_separation: 0.35
    wheel_radius: 0.024
    use_stamped_vel: false
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity
      - position

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
