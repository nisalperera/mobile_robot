controller_manager:
  ros__parameters:
    # Match Gazebo Ignition physics step (1000 Hz = 0.001 s step).
    # At 35 Hz the gz_ros2_control plugin warned:
    #   "Desired controller update period (0.028s) is slower than
    #    the gazebo simulation period (0.001s)"
    # and the diff_drive_controller executed so rarely that velocity
    # commands were silently dropped → robot frozen in Gazebo.
    update_rate: 1000
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    # publish_rate can stay lower — this is only the odom/tf publish rate,
    # not the command execution rate.
    publish_rate: 50.0
    use_sim_time: true

    left_wheel_names:  ['front_left_wheel_joint',  'rear_left_wheel_joint']
    right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']
    wheels_per_side: 2

    # -------------------------------------------------------------------------
    # Wheel geometry — measured from URDF xacro.
    #
    # wheel_radius: 0.024 m  — cylinder radius in left/right_wheels.xacro.
    #
    # wheel_separation: 0.350 m  — lateral distance between left and right
    #   wheel centrelines (left Y=+0.175, right Y=-0.175 relative to base_link).
    #
    # wheel_separation_multiplier: corrects the odometry arc error introduced
    #   by using diff_drive_controller (a 2-wheel model) on a 4-wheel robot.
    #
    #   The robot has a 0.20 m wheelbase:
    #     front wheels: X = +0.150 m (relative to base_link)
    #     rear  wheels: X = -0.050 m (relative to base_link)
    #   Effective virtual axle X = average = +0.050 m.
    #
    #   During a turn, the front and rear wheel pairs trace arcs of different
    #   radii. Gazebo simulates each contact patch independently (correct).
    #   diff_drive_controller averages the front+rear encoder velocities and
    #   applies a single 2-wheel odometry formula (approximate).
    #
    #   The multiplier value of 1.0 means no additional scaling beyond the
    #   physical separation. Start here and tune empirically:
    #     1. Drive a 1-metre square in Gazebo.
    #     2. Compare final pose in /odom vs Gazebo ground-truth pose.
    #     3. If RViz robot lags behind turns: increase toward 1.05.
    #        If RViz robot over-rotates turns: decrease toward 0.95.
    #   Typical range for a 4-wheel skid-steer with 0.20 m wheelbase: 0.95–1.08.
    # -------------------------------------------------------------------------
    wheel_separation: 0.350
    wheel_radius: 0.024
    wheel_separation_multiplier: 1.0
    wheel_radius_multiplier: 1.0

    # Use joint state feedback (encoder positions/velocities) for odometry.
    # open_loop: false is the default but stated explicitly for clarity.
    # With open_loop: true the controller ignores encoder feedback and
    # integrates commands directly — much worse odometry on real hardware.
    open_loop: false

    use_stamped_vel: false

    # -------------------------------------------------------------------------
    # TF and odometry topic configuration.
    #
    # publish_odom: true     → publishes nav_msgs/Odometry on /odom.
    #   This is REQUIRED for Nav2, EKF (robot_localization), and any node
    #   that subscribes to the /odom topic. Distinct from publish_odom_tf.
    #
    # publish_odom_tf: true  → writes the odom → base_footprint transform
    #   directly onto /tf. This is the ONLY publisher of this transform.
    #   Ignition's /tf bridge has been removed from gz.launch.py to
    #   prevent the namespaced Gazebo frames (mobile_robot/odom →
    #   mobile_robot/base_footprint) from clobbering this.
    #
    # odom_frame_id: odom    → must match SLAM Toolbox's odom_frame and
    #                          Nav2's odom topic frame.
    # base_frame_id: base_footprint → must match the URDF root link.
    #   The URDF defines base_footprint as root, with base_link as its
    #   child via a fixed joint published by robot_state_publisher.
    #   Correct chain:
    #     map → odom (SLAM/AMCL)
    #     odom → base_footprint (diff_drive_controller) ← THIS
    #     base_footprint → base_link (robot_state_publisher, fixed)
    #     base_link → chassis/wheels/sensors (robot_state_publisher)
    # -------------------------------------------------------------------------
    publish_odom: true
    publish_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_footprint

    command_interfaces:
      - velocity
    state_interfaces:
      - velocity
      - position

    # -------------------------------------------------------------------------
    # Odometry covariances
    # Diagonal entries for [x, y, z, roll, pitch, yaw].
    # For a ground robot z/roll/pitch are near-zero, so those are tight.
    # x/y/yaw are loosened to reflect real encoder + wheel slip uncertainty.
    # These values feed into SLAM Toolbox and EKF if used.
    # -------------------------------------------------------------------------
    pose_covariance_diagonal:  [0.001, 0.001, 1e-9, 1e-9, 1e-9, 0.01]
    twist_covariance_diagonal: [0.001, 1e-9,  1e-9, 1e-9, 1e-9, 0.01]

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
