# ros_gz_bridge.yaml
#
# Declarative bridge configuration for ros_gz_bridge parameter_bridge.
# Each entry defines one topic bridge between Ignition Gazebo and ROS2.
#
# direction:
#   BIDIRECTIONAL   - both ways
#   GZ_TO_ROS       - Ignition -> ROS only  (sensors, odometry, clock)
#   ROS_TO_GZ       - ROS -> Ignition only  (cmd_vel)
#
# /tf is intentionally NOT bridged.
# Ignition's internal DiffDrive plugin publishes namespaced TF frames
# (mobile_robot/odom -> mobile_robot/base_footprint). Bridging those
# overwrites the correct odom->base_footprint published by
# diff_drive_controller (ros2_control), breaking the TF chain.
# diff_drive_controller is the sole owner of the odom->base_footprint TF.
#
# Lidar topic:
#   Ignition gpu_lidar publishes on the full world-namespaced topic:
#     /world/ignition_world/model/mobile_robot/link/laser_frame/sensor/laser/scan
#   This is bridged and remapped to the ROS topic /scan which is what
#   SLAM Toolbox and Nav2 subscribe to.
#   NOTE: The world name 'ignition_world' must match the <world name=...>
#   in ignition_world.world exactly.

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/diff_drive_controller/cmd_vel_unstamped"
  gz_topic_name: "/model/mobile_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/diff_drive_controller/odom"
  gz_topic_name: "/model/mobile_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

# Lidar: full Ignition namespaced topic -> /scan
- ros_topic_name: "/scan"
  gz_topic_name: "/world/ignition_world/model/mobile_robot/link/laser_frame/sensor/laser/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "ignition.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/left_camera/image"
  gz_topic_name: "/left_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/left_camera/camera_info"
  gz_topic_name: "/left_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/right_camera/image"
  gz_topic_name: "/right_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/right_camera/camera_info"
  gz_topic_name: "/right_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS
