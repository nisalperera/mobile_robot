# ros_gz_bridge.yaml
#
# Declarative bridge configuration for ros_gz_bridge parameter_bridge.
#
# direction:
#   BIDIRECTIONAL  - both ways
#   GZ_TO_ROS      - Ignition -> ROS only  (sensors, odometry, clock)
#   ROS_TO_GZ      - ROS -> Ignition only  (cmd_vel)
#
# /tf is intentionally NOT bridged.
# Ignition's DiffDrive plugin publishes namespaced TF frames
# (mobile_robot/odom). Bridging those overwrites the correct
# odom->base_footprint from diff_drive_controller (ros2_control).
#
# Lidar topic:
#   <topic>scan</topic> in lidar.xacro causes Ignition to publish on
#   the global topic /scan (confirmed via: ign topic -l | grep scan).
#   Bridge maps Ignition /scan -> ROS /scan.
#   /scan/points (PointCloud2) is also bridged for optional use in RViz.

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/diff_drive_controller/cmd_vel_unstamped"
  gz_topic_name: "/model/mobile_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/diff_drive_controller/odom"
  gz_topic_name: "/model/mobile_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

# Lidar 2D scan — Ignition publishes on /scan (global, confirmed)
- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "ignition.msgs.LaserScan"
  direction: GZ_TO_ROS

# Lidar point cloud (optional — useful for RViz PointCloud2 display)
- ros_topic_name: "/scan/points"
  gz_topic_name: "/scan/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "ignition.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

- ros_topic_name: "/left_camera/image"
  gz_topic_name: "/left_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/left_camera/camera_info"
  gz_topic_name: "/left_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/right_camera/image"
  gz_topic_name: "/right_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/right_camera/camera_info"
  gz_topic_name: "/right_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS
